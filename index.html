<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saurabh Manoharan | SCM & Logistics Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>
        :root {
            --bg-color: #030712; /* Deep space black */
            --bg-card: rgba(17, 24, 39, 0.75); /* Frosted glass panel base */
            --text-main: #F9FAFB;
            --text-muted: #9CA3AF;
            --accent: #10B981; /* High-glow Emerald Green */
            --accent-glow: rgba(16, 185, 129, 0.4);
            --border-color: rgba(31, 41, 55, 0.6);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
            position: relative;
        }

        /* --- Multi-Modal Logistics Network Canvas --- */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* --- Hero Section & Global Elements --- */
        header {
            padding: 120px 0 80px 0;
            text-align: center;
            position: relative;
        }

        .avatar-container {
            position: relative;
            width: 150px;
            height: 150px;
            margin: 0 auto 24px auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--accent);
            box-shadow: 0 0 30px var(--accent-glow);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: absolute;
            top: 0;
            left: 0;
            z-index: 3;
            opacity: 0; /* Hidden initially, fades in cleanly if link resolves */
        }

        .avatar:hover {
            transform: scale(1.05) rotate(3deg);
            box-shadow: 0 0 45px rgba(16, 185, 129, 0.6);
        }

        /* Premium Fallback Design seen if LinkedIn blocks the stream */
        .avatar-fallback {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, #111827 0%, #0b0f19 100%);
            border: 2px solid var(--accent);
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            font-size: 36px;
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: 0 0 10px var(--accent-glow);
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
        }

        .avatar-container::after {
            content: '';
            position: absolute;
            top: -5px; left: -5px; right: -5px; bottom: -5px;
            border-radius: 50%;
            border: 1px dashed rgba(16, 185, 129, 0.5);
            animation: spin 20s linear infinite;
            z-index: 1;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .tagline {
            color: var(--accent);
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 20px;
            display: inline-block;
            background: rgba(16, 185, 129, 0.1);
            padding: 6px 16px;
            border-radius: 30px;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        h1 {
            font-size: 48px;
            font-weight: 700;
            line-height: 1.25;
            margin-bottom: 24px;
            letter-spacing: -1px;
            background: linear-gradient(to right, #FFFFFF, #9CA3AF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .summary {
            font-size: 19px;
            color: var(--text-muted);
            max-width: 820px;
            margin: 0 auto 40px auto;
            font-weight: 300;
        }

        .cta-group {
            display: flex;
            gap: 16px;
            justify-content: center;
        }

        .btn {
            display: inline-block;
            padding: 14px 32px;
            font-weight: 600;
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 15px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background-color: var(--accent);
            color: #030712;
            border: none;
            box-shadow: 0 4px 20px rgba(16, 185, 129, 0.3);
        }

        .btn-primary:hover {
            background-color: #34d399;
            transform: translateY(-3px);
            box-shadow: 0 6px 30px rgba(16, 185, 129, 0.5);
        }

        .btn-secondary {
            border: 1px solid var(--border-color);
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
        }

        .btn-secondary:hover {
            background-color: rgba(255, 255, 255, 0.08);
            transform: translateY(-3px);
            border-color: var(--accent);
        }

        /* --- Metric Cards --- */
        .ticker-section {
            padding: 40px 0;
            margin-bottom: 80px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 24px;
        }

        .stat-card {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            padding: 32px 24px;
            border-radius: 12px;
            transition: all 0.4s ease;
        }

        .stat-card:hover {
            border-color: var(--accent);
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.15);
            transform: scale(1.02);
        }

        .stat-card h3 {
            font-size: 36px;
            color: var(--accent);
            margin-bottom: 8px;
            font-weight: 700;
            text-shadow: 0 0 15px var(--accent-glow);
        }

        .stat-card p {
            font-size: 13px;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* --- Content Layout Containers --- */
        .section-title {
            font-size: 30px;
            font-weight: 700;
            margin-bottom: 40px;
            letter-spacing: -0.5px;
        }

        .section-title span {
            color: var(--accent);
        }

        .grid-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 32px;
            margin-bottom: 80px;
        }

        .content-card {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 40px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .content-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 4px; height: 0;
            background: var(--accent);
            transition: height 0.4s ease;
            border-radius: 12px 0 0 12px;
        }

        .content-card:hover::before {
            height: 100%;
        }

        .content-card:hover {
            transform: translateX(6px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            border-color: rgba(16, 185, 129, 0.3);
        }

        .content-card h4 {
            font-size: 24px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .project-detail-item {
            margin-bottom: 16px;
            font-size: 15px;
            color: var(--text-muted);
            display: flex;
            align-items: flex-start;
        }

        .project-detail-item strong {
            color: var(--text-main);
            min-width: 110px;
            display: inline-block;
            font-weight: 600;
        }

        /* --- Interactive Frosted Request Modal --- */
        .modal-overlay {
